<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>Carrossel Bootstrap</title>
  </head>
  <body>
    <main>
      <header>
        <nav class="navbar">
          <button
            class="navbar-toggler p-0 border-0"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#menuOffcanvas"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <span>Carousel Bootstrap</span>
        </nav>
      </header>

      <div class="offcanvas offcanvas-start" id="menuOffcanvas">
        <div class="offcanvas-header">
          <button class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
          <ul class="list-unstyled">
            <li class="mb-3">
              <a
                href="#"
                class="text-decoration-none text-dark"
                style="
                  letter-spacing: 3px;
                  text-transform: uppercase;
                  font-size: 0.9rem;
                "
                >Início</a
              >
            </li>
            <li class="mb-3">
              <a
                href="#"
                class="text-decoration-none text-dark"
                style="
                  letter-spacing: 3px;
                  text-transform: uppercase;
                  font-size: 0.9rem;
                "
                >Sobre</a
              >
            </li>
            <li class="mb-3">
              <a
                href="#"
                class="text-decoration-none text-dark"
                style="
                  letter-spacing: 3px;
                  text-transform: uppercase;
                  font-size: 0.9rem;
                "
                >Contato</a
              >
            </li>
          </ul>
        </div>
      </div>
      <section>
        <div>
          <h1>Carousel Bootstrap</h1>
        </div>
        <div
          id="myCarousel"
          class="carousel slide carousel-fade"
          data-bs-ride="carousel"
        >
          <div class="carousel-indicators">
            <button
              data-bs-target="#myCarousel"
              data-bs-slide-to="0"
              class="active"
            ></button>
            <button data-bs-target="#myCarousel" data-bs-slide-to="1"></button>
            <button data-bs-target="#myCarousel" data-bs-slide-to="2"></button>
          </div>

          <div class="carousel-inner">
            <div class="carousel-item active">
              <img
                src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200"
                class="d-block w-100"
                alt="Slide 1"
              />
            </div>
            <div class="carousel-item">
              <img
                src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=1200"
                class="d-block w-100"
                alt="Slide 2"
              />
            </div>
            <div class="carousel-item">
              <img
                src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=1200"
                class="d-block w-100"
                alt="Slide 3"
              />
            </div>
          </div>

          <button
            class="carousel-control-prev"
            data-bs-target="#myCarousel"
            data-bs-slide="prev"
          >
            <span class="carousel-control-prev-icon"></span>
          </button>
          <button
            class="carousel-control-next"
            data-bs-target="#myCarousel"
            data-bs-slide="next"
          >
            <span class="carousel-control-next-icon"></span>
          </button>
        </div>
        <div class="legenda">
          <p>Carrossel feito utilizando Bootstrap.</p>
        </div>
      </section>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
